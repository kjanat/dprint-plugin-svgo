pre-commit:
  parallel: true
  jobs:
    - name: dprint fmt
      run: dprint fmt --staged
      stage_fixed: true

    - name: cargo clippy
      glob: "*.rs"
      run: deno task check:clippy

    - name: deno check
      glob: "*.{ts,js}"
      run: deno task check:deno

pre-push:
  jobs:
    - name: test
      run: deno task test

    - name: cargo build release
      run: cargo build --release
