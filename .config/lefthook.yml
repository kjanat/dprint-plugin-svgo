pre-commit:
  parallel: true
  jobs:
    - name: dprint fmt
      run: dprint fmt --staged
      stage_fixed: true

    - name: cargo clippy
      glob: "*.rs"
      run: cargo clippy --all-targets -- -D warnings

    - name: deno check
      glob: "*.{ts,js}"
      run: deno check

pre-push:
  jobs:
    - name: cargo test
      run: cargo test --all

    - name: cargo build release
      run: cargo build --release
