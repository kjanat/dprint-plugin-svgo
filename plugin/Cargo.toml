[package]
name = "dprint-plugin-svgo"
version = "0.1.1"
categories = ["development-tools"]
edition = "2024"
keywords = ["formatter", "formatting", "svg", "svgo"]
license = "MIT"
readme = "../README.md"
repository = "https://github.com/kjanat/dprint-plugin-svgo"
description = "A dprint plugin for formatting and optimizing SVG files using SVGO"

[dependencies]
deno_console.workspace = true
deno_core.workspace = true
deno_url.workspace = true
deno_webidl.workspace = true
dprint-core = { workspace = true, features = ["process"] }
dprint-plugin-deno-base = { path = "../base", version = "0.2.0" }
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio = { version = "1", features = ["time"] }

[dev-dependencies]
dprint-development = "0.10"
pretty_assertions = "1.4"

[build-dependencies]
deno_console.workspace = true
deno_core = { workspace = true, features = ["include_js_files_for_snapshotting"] }
deno_url.workspace = true
deno_webidl.workspace = true
dprint-plugin-deno-base = { path = "../base", version = "0.2.0", features = ["build"] }
sha256 = "1.6"
zstd.workspace = true
