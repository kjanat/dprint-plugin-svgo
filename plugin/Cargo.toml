[package]
name = "dprint-plugin-svgo"
version = "0.1.0"
edition = "2021"
description = "A dprint plugin for formatting and optimizing SVG files using SVGO"
license = "MIT"
repository = "https://github.com/kjanat/dprint-plugin-svgo"
readme = "../README.md"
keywords = ["formatting", "formatter", "svg", "svgo"]
categories = ["development-tools"]

[dependencies]
deno_console.workspace = true
deno_core.workspace = true
deno_url.workspace = true
deno_webidl.workspace = true
dprint-core = { workspace = true, features = ["process"] }
dprint-plugin-deno-base = { version = "0.1.0", path = "../base" }
serde.workspace = true
serde_json.workspace = true

[build-dependencies]
deno_console.workspace = true
deno_core = { workspace = true, features = ["include_js_files_for_snapshotting"] }
dprint-plugin-deno-base = { version = "0.1.0", features = ["build"], path = "../base" }
deno_url.workspace = true
deno_webidl.workspace = true
sha256 = "1.5.0"
zstd.workspace = true

[dev-dependencies]
dprint-development = "0.9.5"
pretty_assertions = "1.4.0"
