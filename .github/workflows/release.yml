name: release

on:
  workflow_dispatch:
    inputs:
      releaseKind:
        description: "Kind of release"
        default: "minor"
        type: choice
        options:
          - patch
          - minor
        required: true

jobs:
  rust:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.DPRINT_PAT }}

      - uses: denoland/setup-deno@v2
      - uses: dsherret/rust-toolchain-file@v1

      - name: Bump version and tag
        env:
          GITHUB_TOKEN: ${{ secrets.DPRINT_PAT }}
          GH_WORKFLOW_ACTOR: ${{ github.actor }}
          RELEASE_KIND: ${{ github.event.inputs.releaseKind }}
        run: |
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git config user.name "${{ github.actor }}[bot]"
          deno run --config deno.jsonc -A https://raw.githubusercontent.com/dprint/automation/0.10.3/tasks/publish-release.ts --${RELEASE_KIND} plugin/Cargo.toml
